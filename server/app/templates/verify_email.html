<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 480px; margin: 0 auto; padding: 40px 20px; color: #1a1a1a;">
  <h2 style="margin: 0 0 8px;">Verify your email</h2>
  <p style="color: #666; margin: 0 0 24px;">Click the button below to verify your email address for {{ app_name }}.</p>
  <a href="{{ verify_url }}" style="display: inline-block; background: #6366f1; color: #fff; padding: 12px 24px; border-radius: 8px; text-decoration: none; font-weight: 600;">Verify Email</a>
  <p style="color: #999; font-size: 13px; margin-top: 24px;">If you didn't create an account, you can ignore this email.</p>
  <p style="color: #999; font-size: 13px;">This link expires in {{ expire_hours }} hours.</p>
</body>
</html>
