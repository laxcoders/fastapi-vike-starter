# Render Blueprint — {{APP_DISPLAY_NAME}}
# https://render.com/docs/blueprint-spec

services:
  # FastAPI backend
  - type: web
    name: {{APP_SLUG}}-api
    runtime: python
    plan: standard
    branch: main
    autoDeploy: true
    buildCommand: cd server && pip install -e .
    preDeployCommand: cd server && alembic upgrade head
    startCommand: cd server && gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: {{APP_SLUG}}-db
          property: connectionString
      - key: DATABASE_URL_SYNC
        fromDatabase:
          name: {{APP_SLUG}}-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: {{APP_SLUG}}-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "https://{{APP_SLUG}}-web.onrender.com"
      - key: PYTHON_VERSION
        value: "3.13.3"

  # Celery worker
  - type: worker
    name: {{APP_SLUG}}-worker
    runtime: python
    plan: standard
    branch: main
    autoDeploy: true
    buildCommand: cd server && pip install -e .
    startCommand: cd server && celery -A app.workers.celery_app worker --loglevel=info --concurrency=4
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: {{APP_SLUG}}-db
          property: connectionString
      - key: DATABASE_URL_SYNC
        fromDatabase:
          name: {{APP_SLUG}}-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: {{APP_SLUG}}-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.13.3"

  # Celery Beat scheduler (single instance)
  - type: worker
    name: {{APP_SLUG}}-beat
    runtime: python
    plan: starter
    branch: main
    autoDeploy: true
    buildCommand: cd server && pip install -e .
    startCommand: cd server && celery -A app.workers.celery_app beat --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: {{APP_SLUG}}-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: {{APP_SLUG}}-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.13.3"

  # Vike/React frontend (SSR — Node.js)
  - type: web
    name: {{APP_SLUG}}-web
    runtime: node
    plan: starter
    branch: main
    autoDeploy: true
    buildCommand: cd web && npm ci && npm run build
    startCommand: cd web && node server.js
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: "production"
      - key: VITE_API_URL
        value: "https://{{APP_SLUG}}-api.onrender.com"

  # Redis
  - type: redis
    name: {{APP_SLUG}}-redis
    plan: starter
    ipAllowList: []

databases:
  - name: {{APP_SLUG}}-db
    plan: basic-1gb
